name : CI

on:
    push:
        branches: [main]
    pull_request:
        branches: [main]

jobs:
    test:
        runs-on: ubuntu-latest

        steps:
          - name: Checkout code
            uses: actions/checkout@v4

          - name: Set up Python
            uses: actions/setup-python@v5
            with:
                python-version: "3.10"

          - name: Install dependencies
            run: |
                python -m pip install --upgrade pip
                pip install pytest pytest-cov httpx
                pip install torch --index-url https://download.pytorch.org/whl/cpu
                pip install transformers fastapi uvicorn pydantic

          - name: Download spaCy model
            run: python -m spacy download en_core_web_sm


          - name: Create mock model files
            run: |
                mkdir -p models/tokenizer
                python -c "
                import json, torch
                from transformers import AutoTokenizer, AutoModelForSequenceClassification

                tokenizer = AutoTokenizer.from_pretrained('distilbert-base-uncased')
                tokenizer.save_pretrained('models/tokenizer')
                
                model = AutoModelForSequenceClassification.from_pretrained(
                    'distilbert-base-uncased',
                    num_labels=5,
                    ignore_mismatched_sizes=True
                )
                torch.save(model.state_dict(), 'models/distilbert_best.pt')

                classes = ['authority_appeal', 'demagogy_tricks',
                            'emotional_manipulation', 'fear_appeal', 'rational_argument']
                json.dump(classes, open('models/classes.json', 'w'))
                print('Mock models created!')
                "

          - name: Run tests
            run: |
                pytest tests/ -v --tb=short